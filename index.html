<!DOCTYPE html>
<html>
<head>
    <title>GEAUDIO - Accueil</title>
    <!-- Liens Google Fonts (Nohemi + Police Cursive pour la signature) -->
    <link href="https://fonts.googleapis.com/css2?family=Nohemi&family=Caveat:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nohemi', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            background-color: #ffffff;
            color: #1a1a1a;
        }

        /* Style du Logo en haut à droite */
        .logo {
            position: absolute;
            top: 20px;
            right: 20px;
            max-width: 120px; /* Ajustez la taille ici si besoin */
            height: auto;
        }

        /* Style du Menu en Majuscules */
        .menu {
            margin-top: 30px;
            margin-bottom: 80px;
            text-align: center;
        }

        .menu a {
            font-family: 'Nohemi', sans-serif;
            text-transform: uppercase; /* Force les majuscules */
            text-decoration: none;
            color: #1a1a1a;
            font-weight: bold;
            letter-spacing: 2px; /* Espace un peu les lettres pour un style épuré */
            margin: 0 20px;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .menu a:hover {
            color: #666666; /* Changement de couleur au survol */
        }

        /* Contenu Principal */
        .content {
            max-width: 700px;
            margin: 0 auto;
            padding: 0 20px;
        }

        h1 {
            font-size: 48px;
            letter-spacing: 4px;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 18px;
            color: #666666;
            margin-bottom: 50px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .description {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        /* Style de la Signature */
        .signature {
            font-family: 'Caveat', cursive;
            font-size: 36px;
            color: #1a1a1a;
            margin-top: 30px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <header>
        <!-- Logo -->
        <img src="assets/images/LOGO.png" alt="Mon Logo" class="logo">
        
        <!-- Menu en Majuscules -->
<nav class="menu">
    <a href="index.html">Accueil</a>
    <a href="presentation.html">Présentation</a>
    <a href="audiobank.html">Audiobank</a>
    <a href="depot.html">Dépôt</a>
</nav>
    </header>

    <!-- Présentation -->
    <main class="content">
        <h1>GEAUDIO</h1>
        <div class="subtitle">Quand l'audio est au centre</div>
        
        <p class="description">
            Bienvenue sur mon site, ici tu peux accéder à mes dernières créations, en savoir plus sur moi et déposer tes fichiers.
        </p>
        
        <div class="signature">Genès</div>

</html>
